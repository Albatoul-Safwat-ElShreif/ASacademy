<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AS Academy | Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="signup.css">
    <link rel="shortcut icon" href="imgs/plogo.png" type="image/x-icon">

</head>
<body>
<section class="signup py-5">
    <div class="container">
        <div class="text-center mb-5">
            <h2 class="fw-bold">Join <span>Our Course</span></h2>
            <p class="lead">Fill in your information to reserve your seat today.</p>
        </div>

        <div class="row justify-content-center">
            <div class="col-lg-8 col-xl-7">
                <div class="card signup-card">
                    <div class="card-body p-4 p-lg-5">
                        <form class="row g-4">
                            <div class="col-md-6">
                                <label class="form-label">Full Name</label>
                                <input type="text" class="form-control" placeholder="Enter your full name" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Email Address</label>
                                <input type="email" class="form-control" placeholder="Enter your email" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Phone Number</label>
                                <input type="tel" class="form-control" placeholder="+20 100 000 0000" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Choose Course</label>
                                <select class="form-select" required>
                                    <option selected disabled>Select Course</option>
                                    <option>HTML & CSS</option>
                                    <option>Bootstrap</option>
                                    <option>JavaScript</option>
                                    <option>React</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Message</label>
                                <textarea class="form-control"rows="5"placeholder="Write your message..."></textarea>
                            </div>
                            <div class="col-12">
                                <button class="btn signup-btn w-100">Enroll Now</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</section>
</section>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
